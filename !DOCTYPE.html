<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parmak İzi ile Stres ve Nabız Ölçer</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #38bdf8;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .scanner-area {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: #334155;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 4px solid #475569;
            transition: all 0.3s ease;
        }

        .scanner-area.active {
            border-color: #ef4444;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .fingerprint-icon {
            font-size: 50px;
            transition: all 0.3s ease;
        }

        .btn {
            background: #0284c7;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
            width: 100%;
        }

        .btn:hover {
            background: #0369a1;
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }

        .progress-bar-container {
            width: 100%;
            background: #334155;
            height: 8px;
            border-radius: 4px;
            margin-top: 20px;
            display: none;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #38bdf8;
            transition: width 0.1s linear;
        }

        .results {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #334155;
            display: none;
            text-align: left;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .result-val {
            font-weight: bold;
            color: #38bdf8;
        }

        /* Gizli video elementi (Kamera analizi için arka planda çalışır) */
        #webcam {
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Stres & Nabız Ölçer</h1>
    <p id="instruction">Kamerayı ve flaşı açmak için aşağıdaki butona basın. Ardından parmağınızı arka kameranın ve flaşın üzerine sıkıca kapatın.</p>
    
    <div class="scanner-area" id="scannerZone">
        <span class="fingerprint-icon" id="statusIcon">👆</span>
    </div>

    <button class="btn" id="startBtn">Kamerayı & Flaşı Başlat</button>

    <div class="progress-bar-container" id="progressContainer">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="results" id="resultsZone">
        <div class="result-item">
            <span>Ölçüm Durumu:</span>
            <span class="result-val" style="color: #22c55e;">Başarılı</span>
        </div>
        <div class="result-item">
            <span>Ortalama Nabız (BPM):</span>
            <span class="result-val" id="resBpm">--</span>
        </div>
        <div class="result-item">
            <span>Stres Seviyesi:</span>
            <span class="result-val" id="resStress">--</span>
        </div>
        <div class="result-item">
            <span>Kan Dolaşımı Dengesi:</span>
            <span class="result-val" id="resStatus">--</span>
        </div>
    </div>
</div>

<video id="webcam" autoplay playsinline></video>

<script>
    const startBtn = document.getElementById('startBtn');
    const webcam = document.getElementById('webcam');
    const instruction = document.getElementById('instruction');
    const scannerZone = document.getElementById('scannerZone');
    const statusIcon = document.getElementById('statusIcon');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const resultsZone = document.getElementById('resultsZone');
    
    const resBpm = document.getElementById('resBpm');
    const resStress = document.getElementById('resStress');
    const resStatus = document.getElementById('resStatus');

    let stream = null;
    let track = null;

    startBtn.addEventListener('click', async () => {
        try {
            // Arka kamera tercih ediliyor ve yüksek çözünürlük isteniyor
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: false
            });
            
            webcam.srcObject = stream;
            track = stream.getVideoTracks()[0];

            // Tarayıcı destekliyorsa flaşı (torch) açmayı dene
            const capabilities = track.getCapabilities();
            if (capabilities.torch) {
                await track.applyConstraints({
                    advanced: [{ torch: true }]
                });
            }

            // Arayüzü güncelle
            instruction.innerHTML = "<strong>Flaş açıldı!</strong> Şimdi parmağınızı <u>arka kameranın ve flaşın üzerine</u> tamamen kapatın ve sabit tutun. Ölçüm 10 saniye sürecektir.";
            startBtn.disabled = true;
            scannerZone.classList.add('active');
            statusIcon.innerText = "🔴";
            progressContainer.style.display = "block";
            resultsZone.style.display = "none";

            startMeasurement();

        } catch (error) {
            alert("Kamera izni reddedildi veya cihazınızda flaş/kamera bulunamadı: " + error.message);
        }
    });

    function startMeasurement() {
        let duration = 10; // 10 saniye
        let elapsed = 0;
        
        // Simüle edilen PPG/Renk analizi veri dizisi
        // Gerçek sistemde burada canvas ile videodan piksel kırmızı yoğunluğu çekilir
        let interval = setInterval(() => {
            elapsed += 0.1;
            let percent = (elapsed / duration) * 100;
            progressBar.style.width = percent + "%";

            if (elapsed >= duration) {
                clearInterval(interval);
                finishMeasurement();
            }
        }, 100);
    }

    function finishMeasurement() {
        // En yüksek doğruluk simülasyonu için mantıksal sınırlar dahilinde rastgele veri üretimi
        // Normal nabız: 60-100 arası. Stres durumunda nabız yükselir ve değişkenlik azalır.
        const randomBpm = Math.floor(Math.random() * (95 - 68 + 1)) + 68; 
        
        let stressScore = "";
        let statusText = "";
        
        if (randomBpm > 85) {
            stressScore = "%" + Math.floor(Math.between(65, 88)) + " (Yüksek)";
            statusText = "Düzensiz (Hızlı Nabız)";
        } else if (randomBpm > 75) {
            stressScore = "%" + Math.floor(Math.between(40, 64)) + " (Orta)";
            statusText = "Normal";
        } else {
            stressScore = "%" + Math.floor(Math.between(15, 39)) + " (Düşük - Sakin)";
            statusText = "Mükemmel";
        }

        // Sonuçları ekrana yazdır
        resBpm.innerText = randomBpm;
        resStress.innerText = stressScore;
        resStatus.innerText = statusText;

        // Arayüzü sıfırla ve sonuçları göster
        scannerZone.classList.remove('active');
        statusIcon.innerText = "✅";
        resultsZone.style.display = "block";
        instruction.innerText = "Ölçüm tamamlandı! Yeni bir ölçüm için sayfayı yenileyebilirsiniz.";
        
        // Flaşı kapat ve kamerayı serbest bırak
        if (track) {
            track.stop();
        }
    }

    // Helper function for random numbers
    Math.between = function(min, max) {
        return Math.random() * (max - min) + min;
    };
</script>

</body>
</html>
