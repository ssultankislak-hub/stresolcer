<script>
// ═══════════════════════════════════════════════
// PPG SIGNAL PROCESSOR v3 — Fixed & Synchronized
// ═══════════════════════════════════════════════

const VIDEO = document.getElementById('videoEl');
const CANVAS = document.getElementById('canvasEl');
const CTX = CANVAS.getContext('2d');
const WAVEFORM = document.getElementById('waveformCanvas');
const WCTX = WAVEFORM.getContext('2d');

let stream = null;
let animFrame = null;
let isRunning = false;
let isCalibrating = false;

// Signal buffers
const BUFFER_SIZE = 600;
const filteredSignal = []; // after DC removal + smooth
const peakMarkers    = []; // boolean array aligned to filteredSignal
const timeOffsets    = []; // timestamps of each frame to sync peak times
const rrIntervals    = []; // validated R-R intervals (ms)

let lastPeakTime   = 0;
let frameCount     = 0;
let measureStart   = 0;
let lastFrameTime  = 0;
let estimatedFPS   = 30;
let signalQuality  = 0;

// History array to store past measurements
const measurementHistory = [];

// ── DC-removal + smoothing state ──────────────────
let dcAlpha = 0.98;  
let dcPrev  = 0;     
let smoothBuf = [];  

function removeDC(x) {
  dcPrev = dcAlpha * dcPrev + (1 - dcAlpha) * x;
  return x - dcPrev;
}

function smooth(x, n = 5) {
  smoothBuf.push(x);
  if (smoothBuf.length > n) smoothBuf.shift();
  return smoothBuf.reduce((a,b)=>a+b,0) / smoothBuf.length;
}

// ── Adaptive peak detector (FIXED SYNCHRONIZATION) ────────────────────────
let adaptiveThreshold = 0;
const REFRACTORY_MS   = 350; // Max ~170 BPM limit

function detectPeakAdaptive(sig, timestamps) {
  const len = sig.length;
  if (len < 6) return { isPeak: false };

  // Look-ahead index matching the peak logic (3 frames ago)
  const idx = len - 4;
  if (idx < 3) return { isPeak: false };

  const peakTime = timestamps[idx];
  if (peakTime - lastPeakTime < REFRACTORY_MS) return { isPeak: false };

  const v     = sig[idx];
  const prev2 = sig[idx - 2];
  const prev1 = sig[idx - 1];
  const next1 = sig[idx + 1];
  const next2 = sig[idx + 2];
  const next3 = sig[idx + 3];

  // Local maximum verification
  if (!(v > prev2 && v > prev1 && v > next1 && v > next2 && v > next3)) return { isPeak: false };

  // Adaptive threshold calculation
  const window = sig.slice(Math.max(0, len - 90)); 
  const wMax = Math.max(...window);
  const wMin = Math.min(...window);
  const amp  = wMax - wMin;

  if (amp < 0.003) return { isPeak: false }; // Signal flat

  adaptiveThreshold = wMin + amp * 0.52; 
  
  if (v > adaptiveThreshold) {
    return { isPeak: true, actualTime: peakTime };
  }
  return { isPeak: false };
}

// ── RR outlier filter (ectopic beat removal) ──────
function filterRR(rr) {
  if (rr.length < 3) return rr;
  const sorted = [...rr].sort((a,b)=>a-b);
  const median = sorted[Math.floor(sorted.length/2)];
  return rr.filter(r => Math.abs(r - median) / median < 0.35); // 35% tolerance
}

// ── HRV statistics ────────────────────────────────
function calcHRV(rrRaw) {
  const rr = filterRR(rrRaw);
  if (rr.length < 3) return { bpm: 0, sdnn: 0, rmssd: 0 };

  const sorted = [...rr].sort((a,b)=>a-b);
  const medRR  = sorted[Math.floor(sorted.length/2)];
  const bpm    = Math.round(60000 / medRR);

  // SDNN
  const mean = rr.reduce((a,b)=>a+b,0) / rr.length;
  const sdnn = Math.round(Math.sqrt(rr.reduce((a,b)=>a+(b-mean)**2,0)/(rr.length-1)));

  // RMSSD
  let sq = 0;
  for (let i=1;i<rr.length;i++) sq += (rr[i]-rr[i-1])**2;
  const rmssd = Math.round(Math.sqrt(sq/(rr.length-1)));

  return { bpm, sdnn, rmssd };
}

// ── Stress mapping ────────────────────────────────
function hrvToStress(rmssd, sdnn) {
  if (!rmssd || !sdnn) return null;
  const rmssdScore = Math.max(5, Math.min(95, 100 - (rmssd - 10) * 1.2));
  const sdnnScore  = Math.max(5, Math.min(95, 100 - (sdnn  - 15) * 0.9));
  return Math.round(rmssdScore * 0.60 + sdnnScore * 0.40);
}

// ═══════════════════════════════════════════════
// WAVEFORM RENDERER
// ═══════════════════════════════════════════════

function resizeWaveform() {
  const dpr = window.devicePixelRatio || 1;
  const rect = WAVEFORM.getBoundingClientRect();
  WAVEFORM.width = rect.width * dpr;
  WAVEFORM.height = rect.height * dpr;
  WCTX.scale(dpr, dpr);
}

function drawWaveform() {
  const rect = WAVEFORM.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  WCTX.clearRect(0, 0, w, h);

  if (filteredSignal.length < 10) {
    WCTX.strokeStyle = '#ffffff08';
    WCTX.lineWidth = 1;
    WCTX.beginPath(); WCTX.moveTo(0,h/2); WCTX.lineTo(w,h/2); WCTX.stroke();
    return;
  }

  const N   = Math.min(filteredSignal.length, 180);
  const sig = filteredSignal.slice(-N);
  const mrk = peakMarkers.slice(-N);

  const sigMin = Math.min(...sig);
  const sigMax = Math.max(...sig);
  const range  = sigMax - sigMin || 0.001;

  const toY = v => h - ((v - sigMin) / range) * (h * 0.75) - h * 0.12;
  const toX = i => (i / (N - 1)) * w;

  if (adaptiveThreshold !== 0) {
    const ty = toY(adaptiveThreshold);
    WCTX.strokeStyle = '#ffffff12';
    WCTX.lineWidth = 1;
    WCTX.setLineDash([4, 6]);
    WCTX.beginPath(); WCTX.moveTo(0, ty); WCTX.lineTo(w, ty); WCTX.stroke();
    WCTX.setLineDash([]);
  }

  const grad = WCTX.createLinearGradient(0, 0, w, 0);
  grad.addColorStop(0,   '#e8392a22');
  grad.addColorStop(0.4, '#e8392add');
  grad.addColorStop(1,   '#e8392a55');

  WCTX.strokeStyle = grad;
  WCTX.lineWidth   = 2.5;
  WCTX.lineJoin    = 'round';
  WCTX.lineCap     = 'round';
  WCTX.beginPath();
  sig.forEach((v, i) => {
    const x = toX(i), y = toY(v);
    i === 0 ? WCTX.moveTo(x, y) : WCTX.lineTo(x, y);
  });
  WCTX.stroke();

  mrk.forEach((isPeak, i) => {
    if (!isPeak) return;
    const x = toX(i), y = toY(sig[i]);
    WCTX.beginPath();
    WCTX.arc(x, y, 4.5, 0, Math.PI * 2);
    WCTX.fillStyle = '#ffffff';
    WCTX.shadowColor = '#e8392a';
    WCTX.shadowBlur  = 10;
    WCTX.fill();
    WCTX.shadowBlur = 0;
  });
}

// ═══════════════════════════════════════════════
// UI UPDATES
// ═══════════════════════════════════════════════

function updateUI(stats) {
  const { bpm, sdnn, rmssd } = stats;
  const stress = hrvToStress(rmssd, sdnn);

  if (bpm > 40 && bpm < 180) {
    document.getElementById('bpmDisplay').textContent = bpm;
  }

  if (sdnn > 0) {
    document.getElementById('hrvDisplay').textContent = sdnn;
    document.getElementById('cardHRV').classList.add('active');
  }
  if (rmssd > 0) {
    document.getElementById('rmssdDisplay').textContent = rmssd;
    document.getElementById('cardRMSSD').classList.add('active');
  }

  if (stress !== null) {
    updateStressUI(stress);
  }

  const dots = [1,2,3,4,5].map(i=>document.getElementById('q'+i));
  const litCount = Math.round(signalQuality * 5);
  dots.forEach((d,i)=> d.classList.toggle('lit', i < litCount));
}

let lastStress = null;
function updateStressUI(stress) {
  const scoreEl = document.getElementById('stressScore');
  const badgeEl = document.getElementById('stressBadge');
  const fillEl  = document.getElementById('meterFill');

  lastStress = stress;
  scoreEl.textContent = stress;
  fillEl.style.width = stress + '%';

  let label, color, shadow, bg, bc;
  if (stress < 35) {
    label = '🟢 Rahat'; color = '#2de08b'; shadow = '#2de08b44';
    bg = '#2de08b11'; bc = '#2de08b44';
  } else if (stress < 60) {
    label = '🟡 Hafif Stres'; color = '#f5a623'; shadow = '#f5a62344';
    bg = '#f5a62311'; bc = '#f5a62344';
  } else if (stress < 80) {
    label = '🟠 Orta Stres'; color = '#ff6b35'; shadow = '#ff6b3544';
    bg = '#ff6b3511'; bc = '#ff6b3544';
  } else {
    label = '🔴 Yüksek Stres'; color = '#e8392a'; shadow = '#e8392a66';
    bg = '#e8392a15'; bc = '#e8392a55';
  }

  scoreEl.style.color = color;
  scoreEl.style.textShadow = `0 0 40px ${shadow}`;
  badgeEl.textContent = label;
  badgeEl.style.setProperty('--badge-color', color);
  badgeEl.style.setProperty('--badge-bg', bg);
  badgeEl.style.setProperty('--badge-border', bc);
}

// ═══════════════════════════════════════════════
// MAIN MEASUREMENT LOOP
// ═══════════════════════════════════════════════

function measureLoop(timestamp) {
  if (!isRunning) return;

  if (lastFrameTime) {
    const dt = timestamp - lastFrameTime;
    if (dt > 0) estimatedFPS = 0.95 * estimatedFPS + 0.05 * (1000 / dt);
  }
  lastFrameTime = timestamp;

  // Frame Capture & Color Extraction
  CTX.drawImage(VIDEO, 0, 0, 100, 100);
  const pixels = CTX.getImageData(20, 20, 60, 60).data; 
  let rSum = 0, gSum = 0, bSum = 0;
  const n = pixels.length / 4;
  for (let i = 0; i < pixels.length; i += 4) {
    rSum += pixels[i];
    gSum += pixels[i+1];
    bSum += pixels[i+2];
  }
  const rMean = rSum / n / 255;
  const gMean = gSum / n / 255;
  const bMean = bSum / n / 255;

  // Signal Quality Heuristic
  const covered = rMean > 0.45 && rMean > gMean * 1.8 && rMean > bMean * 2.0;
  const redness = Math.max(0, rMean - (gMean + bMean) * 0.5);
  signalQuality = covered
    ? Math.min(1, 0.8 * signalQuality + 0.2 * Math.min(1, redness * 3.5))
    : Math.max(0, signalQuality - 0.1);

  if (!isCalibrating && signalQuality > 0.3) {
    const ac = removeDC(rMean);   
    const s  = smooth(ac, 4);     

    filteredSignal.push(s);
    peakMarkers.push(false);
    timeOffsets.push(performance.now()); // Fixed: Push strict frame timestamp
    
    if (filteredSignal.length > BUFFER_SIZE) { 
      filteredSignal.shift(); 
      peakMarkers.shift(); 
      timeOffsets.shift();
    }

    // Fixed Peak Detection Logic with Synced Timestamps
    if (filteredSignal.length > 10) {
      const peakResult = detectPeakAdaptive(filteredSignal, timeOffsets);
      if (peakResult.isPeak) {
        const markIdx = peakMarkers.length - 4;
        if (markIdx >= 0) peakMarkers[markIdx] = true;

        if (lastPeakTime > 0) {
          const rr = peakResult.actualTime - lastPeakTime; // Calculated using strict historical frame diffs
          if (rr > 333 && rr < 1350) {
            rrIntervals.push(rr);
            if (rrIntervals.length > 50) rrIntervals.shift();
            triggerPulse();
          }
        }
        lastPeakTime = peakResult.actualTime;
      }
    }

    // UI Updates
    frameCount++;
    if (frameCount % Math.round(estimatedFPS) === 0) {
      if (rrIntervals.length >= 4) {
        const stats = calcHRV(rrIntervals);
        updateUI(stats);
      }
    }
  } else {
    // If finger is removed, visually drop quality fast
    const dots = [1,2,3,4,5].map(i=>document.getElementById('q'+i));
    dots.forEach(d => d.classList.remove('lit'));
  }

  drawWaveform();
  animFrame = requestAnimationFrame(measureLoop);
}

let pulseTimeout = null;
function triggerPulse() {
  const rings = document.getElementById('pulseRings');
  if(!rings) return;
  rings.classList.add('visible');
  clearTimeout(pulseTimeout);
  pulseTimeout = setTimeout(()=>rings.classList.remove('visible'), 400);
}

// ═══════════════════════════════════════════════
// CAMERA MANAGEMENT
// ═══════════════════════════════════════════════

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: 'environment',
        width: { ideal: 480 },
        height: { ideal: 480 },
        frameRate: { ideal: 30 }
      }
    });
    VIDEO.srcObject = stream;
    await VIDEO.play();

    const track = stream.getVideoTracks()[0];
    try {
      await track.applyConstraints({ advanced: [{ torch: true }] });
    } catch(e) {
      console.log('Torch/Flash error or not available:', e.message);
    }
    return true;
  } catch(e) {
    alert('Kamera erişimi hatası: ' + e.message);
    return false;
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => {
      try { t.applyConstraints({ advanced: [{ torch: false }] }); } catch(e){}
      t.stop();
    });
    stream = null;
  }
  VIDEO.srcObject = null;
}

// ═══════════════════════════════════════════════
// COUNTDOWN
// ═══════════════════════════════════════════════

function runCountdown(n) {
  return new Promise(resolve => {
    const overlay = document.getElementById('countdownOverlay');
    const numEl = document.getElementById('countdownNum');
    overlay.classList.add('active');
    let count = n;
    numEl.textContent = count;
    const interval = setInterval(() => {
      count--;
      if (count <= 0) {
        clearInterval(interval);
        overlay.classList.remove('active');
        resolve();
      } else {
        numEl.textContent = count;
      }
    }, 1000);
  });
}

// ═══════════════════════════════════════════════
// TOGGLE & CONTROLS (COMPLETED FUNCTIONS)
// ═══════════════════════════════════════════════

async function toggleMeasurement() {
  if (!isRunning) {
    await startMeasurement();
  } else {
    stopMeasurement();
  }
}

async function startMeasurement() {
  const btn = document.getElementById('btnMain');
  btn.disabled = true;
  btn.textContent = 'Kamera açılıyor...';

  const ok = await startCamera();
  if (!ok) {
    btn.disabled = false;
    btn.textContent = 'Ölçümü Başlat';
    return;
  }

  document.getElementById('statusPill').textContent = "Ölçülüyor";
  document.getElementById('statusPill').classList.add('active');
  document.getElementById('idlePrompt').classList.add('hidden');
  document.getElementById('liveReadout').classList.add('visible');

  resizeWaveform();
  await runCountdown(3);

  // Reset local analysis fields
  filteredSignal.length = 0;
  peakMarkers.length = 0;
  timeOffsets.length = 0;
  rrIntervals.length = 0;
  lastPeakTime = 0;
  frameCount = 0;
  dcPrev = 0;
  smoothBuf.length = 0;
  adaptiveThreshold = 0;
  lastStress = null;
  signalQuality = 0;
  estimatedFPS = 30;

  isCalibrating = true;
  setTimeout(() => { isCalibrating = false; }, 2000); 

  isRunning = true;
  btn.disabled = false;
  btn.textContent = 'Ölçümü Durdur';
  btn.className = "btn-main btn-stop";

  animFrame = requestAnimationFrame(measureLoop);
}

function stopMeasurement() {
  isRunning = false;
  cancelAnimationFrame(animFrame);
  stopCamera();

  const btn = document.getElementById('btnMain');
  btn.textContent = 'Ölçümü Başlat';
  btn.className = "btn-main btn-start";
  
  document.getElementById('statusPill').textContent = "Hazır";
  document.getElementById('statusPill').classList.remove('active');

  // Add final stats to historical layout if valid data exists
  if (rrIntervals.length >= 5) {
    const finalStats = calcHRV(rrIntervals);
    const finalStress = hrvToStress(finalStats.rmssd, finalStats.sdnn);
    if(finalStats.bpm > 0) {
      saveToHistory(finalStats.bpm, finalStats.sdnn, finalStress);
    }
  }
}

function saveToHistory(bpm, hrv, stress) {
  const historySec = document.getElementById('historySection');
  const historyList = document.getElementById('historyList');
  historySec.style.display = 'block';

  const now = new Date();
  const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

  const item = document.createElement('div');
  item.className = 'history-item';
  item.innerHTML = `
    <div class="history-time">${timeStr}</div>
    <div class="history-vals">
      <div class="history-val">❤️ <b>${bpm}</b> BPM</div>
      <div class="history-val">⚡ <b>${hrv}</b> ms</div>
    </div>
    <div class="history-stress" style="background:#ffffff0a">${stress ? '%'+stress+' Stres' : '--'}</div>
  `;
  historyList.prepend(item);
}

window.addEventListener('resize', resizeWaveform);
</script>
